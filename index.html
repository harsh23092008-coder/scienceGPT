<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScienceGPT - AI Science Tutor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>ScienceGPT 🧪</h1>
        <span id="status-text">Physics | Chemistry | Biology | Maths | Anything</span>
      </div>
      <div class="header-right">
        <button id="new-chat-btn" title="New Chat">📄 New</button>
        <button id="export-btn" title="Export Chat">💾 Export</button>
        <button id="clear-btn" title="Clear Chat">🗑️ Clear</button>
        <label class="theme-switch">
          <input type="checkbox" id="theme-toggle">
          <span class="slider">🌙</span>
        </label>
      </div>
    </header>

    <div id="chat-box"></div>

    <div class="input-area">
      <textarea 
        id="user-input" 
        placeholder="Ask me anything about Science or Maths..." 
        rows="1"
      ></textarea>
      <button id="send-btn">Send ➤</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
