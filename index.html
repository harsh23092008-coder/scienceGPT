<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScienceGPT Pro 🧪</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="btn-new" id="newChatBtn">+ New Chat</button>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
            
            <div class="controls">
                <label>Level:</label>
                <select id="levelSelect">
                    <option value="easy">Class 9-10</option>
                    <option value="medium" selected>Class 11-12</option>
                    <option value="NEET">NEET UG</option>
                    <option value="JEE">JEE Adv</option>
                    <option value="olympiad">Olympiad</option>
                </select>
                
                <label>Mode:</label>
                <select id="modeSelect">
                    <option value="solve">Step-by-Step Solve</option>
                    <option value="short">Short Answer</option>
                    <option value="chat">Dost Mode</option>
                    <option value="mock">Mock Test</option>
                </select>
            </div>

            <div class="tools">
                <button class="tool-btn" id="formulaBtn">📋 Formula Sheet</button>
                <button class="tool-btn" id="pyqBtn">📚 PYQ Finder</button>
                <button class="tool-btn" id="exportBtn">💾 Export Chat</button>
            </div>

            <div class="history" id="historyList"></div>
            <div class="footer-note">Powered by Groq Llama 3.3</div>
        </aside>

        <main class="main">
            <header class="header">
                <button class="menu-btn" id="menuBtn">☰</button>
                <div>
                    <h1>ScienceGPT Pro 🧪</h1>
                    <p id="statusText">Physics | Chemistry | Biology | Maths | Anything</p>
                </div>
                <button class="tts-toggle" id="ttsToggle">🔊 Off</button>
            </header>

            <div class="chat-container" id="chatContainer">
                <div class="message bot">
                    <div class="avatar">S</div>
                    <div class="content">
                        <p>Ha bhai ScienceGPT Pro yaha! 💪</p>
                        <p>Numerical ka photo bhejo, voice se poocho, mock test lo - sab karunga.</p>
                        <p>$$E = mc^2$$ se leke Quantum Mechanics tak, NEET se JEE tak.</p>
                        <p>Bas pooch ke toh dekho 👇</p>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="preview" id="imagePreview"></div>
                <div class="input-wrapper">
                    <input type="file" id="imageInput" accept="image/*" hidden>
                    <button class="icon-btn" id="imageBtn" title="Upload Image">📷</button>
                    <button class="icon-btn" id="voiceBtn" title="Voice Input">🎤</button>
                    <textarea id="userInput" placeholder="Sawaal likho, photo bhejo, ya bol ke poocho..." rows="1"></textarea>
                    <button id="sendBtn" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2"/></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
